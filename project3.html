<!DOCTYPE html>
<html>
<head>
<title>SmartCity Portal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {font-family: Arial; margin:0; background:#eef2f7}
nav {background:#0d47a1; color:white; padding:12px; display:flex; justify-content:space-between}
button {margin:5px; padding:6px 12px; cursor:pointer}
section {display:none; padding:20px}
.active {display:block}
.badge {padding:5px 10px; border-radius:10px; color:white; font-size:12px}
.ns {background:red}
.ip {background:orange}
.c {background:green}
img {max-width:120px; margin-top:5px}
#map {height:400px}
.card {border:1px solid #ccc; padding:10px; margin:10px; background:white}
</style>
</head>

<body>

<nav>
<h2>SmartCity Portal</h2>
<div>
<button onclick="show('userLogin')">User</button>
<button onclick="show('adminLogin')">Admin</button>
<button onclick="show('review')">Review</button>
<button onclick="show('work')">Work</button>
<button onclick="show('mapTab'); loadMap()">Map</button>
</div>
</nav>

<canvas id="clock" width="200" height="200"></canvas>

<!-- USER LOGIN -->
<section id="userLogin" class="active">
<h3>User Login</h3>
<input id="uname" placeholder="Username"><br><br>
<input id="upass" type="password" placeholder="Password"><br><br>
<button onclick="userLogin()">Login</button>
</section>

<!-- USER DASH -->
<section id="userDash">
<h3>Welcome <span id="user"></span></h3>

<select id="type">
<option>Street Light</option>
<option>Pothole</option>
<option>Electricity</option>
<option>Water</option>
</select><br><br>

<select id="city">
<option>Mumbai</option>
<option>Delhi</option>
<option>Chennai</option>
<option>Bangalore</option>
</select><br><br>

<input type="file" id="before"><br><br>
<button onclick="addComplaint()">Submit Complaint</button>

<ul id="userList"></ul>
</section>

<!-- ADMIN -->
<section id="adminLogin">
<h3>Admin Login</h3>
<input id="aname" placeholder="admin"><br>
<input id="apass" placeholder="admin"><br>
<button onclick="adminLogin()">Login</button>
</section>

<section id="adminDash">
<h3>Admin Panel</h3>

<select onchange="filterType(this.value)">
<option value="all">All</option>
<option>Street Light</option>
<option>Pothole</option>
<option>Electricity</option>
<option>Water</option>
</select>

<table border="1" width="100%">
<thead>
<tr>
<th>User</th><th>Issue</th><th>City</th><th>Date</th>
<th>Before</th><th>After</th><th>Status</th>
</tr>
</thead>
<tbody id="adminTable"></tbody>
</table>

<canvas id="bar"></canvas>
<canvas id="pie"></canvas>
</section>

<!-- REVIEW -->
<section id="review">
<input id="reviewInput">
<button onclick="addReview()">Add</button>
<ul id="reviewList"></ul>
</section>

<!-- WORK -->
<section id="work">
<h3>Previous Work</h3>
<div id="gallery"></div>
</section>

<!-- MAP -->
<section id="mapTab">
<h3>India Complaints Map</h3>
<div id="map"></div>
</section>

<script>
let complaints = JSON.parse(localStorage.getItem("data")) || [];
let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
let currentUser = "";
let filter = "all";

function save(){
localStorage.setItem("data", JSON.stringify(complaints));
renderWork();
}

/* NAV */
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* USER */
function userLogin(){
let u = uname.value.trim();
if(!u) return alert("Enter username");
currentUser = u;
user.innerText = u;
show("userDash");
renderUser();
}

function addComplaint(){
let file = before.files[0];
if(!file) return alert("Upload image");

let reader = new FileReader();
reader.onload = function(){
complaints.push({
user: currentUser,
type: type.value,
city: city.value,
before: reader.result,
after: "",
status: "Not Started",
date: new Date().toLocaleString()
});
save();
renderUser();
};
reader.readAsDataURL(file);
}

function renderUser(){
userList.innerHTML="";
complaints.filter(c=>c.user===currentUser).forEach(c=>{
userList.innerHTML+=`<li>${c.type} - ${c.city} (${c.date})</li>`;
});
}

/* ADMIN */
function adminLogin(){
if(aname.value==="admin" && apass.value==="admin"){
show("adminDash");
renderAdmin();
}
}

function renderAdmin(){
let html="";
complaints.forEach((c,i)=>{
if(filter!=="all" && c.type!==filter) return;

html+=`
<tr>
<td>${c.user}</td>
<td>${c.type}</td>
<td>${c.city}</td>
<td>${c.date}</td>
<td><img src="${c.before}"></td>
<td>
${c.after ? `<img src="${c.after}">`
: `<input type="file" onchange="uploadAfter(${i},this)">`}
</td>
<td>
<select onchange="updateStatus(${i},this.value)">
<option ${c.status=="Not Started"?"selected":""}>Not Started</option>
<option ${c.status=="In Progress"?"selected":""}>In Progress</option>
<option ${c.status=="Completed"?"selected":""}>Completed</option>
</select>
<br>
<span class="badge ${c.status=="Completed"?"c":c.status=="In Progress"?"ip":"ns"}">${c.status}</span>
</td>
</tr>`;
});
adminTable.innerHTML = html;
renderCharts();
}

function uploadAfter(i,input){
let file = input.files[0];
if(!file) return;

let reader = new FileReader();
reader.onload=function(){
complaints[i].after = reader.result;
save();
renderAdmin();
};
reader.readAsDataURL(file);
}

function updateStatus(i,val){
complaints[i].status = val;
save();
renderAdmin();
}

function filterType(t){
filter = t;
renderAdmin();
}

/* CHARTS */
function renderCharts(){
let types={}, status={"Completed":0,"In Progress":0,"Not Started":0};

complaints.forEach(c=>{
types[c.type]=(types[c.type]||0)+1;
status[c.status]++;
});

new Chart(bar,{type:'bar',data:{labels:Object.keys(types),datasets:[{data:Object.values(types)}]}});
new Chart(pie,{type:'pie',data:{labels:Object.keys(status),datasets:[{data:Object.values(status)}]}});
}

/* WORK */
function renderWork(){
gallery.innerHTML="";
complaints.forEach(c=>{
gallery.innerHTML+=`
<div class="card">
<h4>${c.type} (${c.city})</h4>
<p>${c.date}</p>
<b>Before:</b>
<img src="${c.before}">
<b>After:</b>
${c.after ? `<img src="${c.after}">` : "<p>No after image</p>"}
<br>
<span class="badge ${c.status=="Completed"?"c":c.status=="In Progress"?"ip":"ns"}">${c.status}</span>
</div>`;
});
}

/* REVIEW */
function addReview(){
let r = reviewInput.value.trim();
if(!r) return;
reviews.push(r);
localStorage.setItem("reviews", JSON.stringify(reviews));
reviewInput.value="";
reviewList.innerHTML = reviews.map(x=>`<li>${x}</li>`).join("");
}
reviewList.innerHTML = reviews.map(x=>`<li>${x}</li>`).join("");

/* MAP */
function loadMap(){
let map = L.map('map').setView([20.5937,78.9629],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let coords={
Mumbai:[19.0760,72.8777],
Delhi:[28.7041,77.1025],
Chennai:[13.0827,80.2707],
Bangalore:[12.9716,77.5946]
};

complaints.forEach(c=>{
if(coords[c.city]){
L.marker(coords[c.city]).addTo(map)
.bindPopup(`${c.type}<br>${c.city}<br>${c.status}`);
}
});
}

/* CLOCK */
let canvas=document.getElementById("clock");
let ctx=canvas.getContext("2d");
let radius=canvas.height/2;
ctx.translate(radius,radius);
radius*=0.9;

setInterval(drawClock,1000);

function drawClock(){
ctx.clearRect(-radius,-radius,canvas.width,canvas.height);

ctx.beginPath();
ctx.arc(0,0,radius,0,2*Math.PI);
ctx.fillStyle="white";
ctx.fill();
ctx.stroke();

let now=new Date();
let hour=now.getHours()%12;
let minute=now.getMinutes();
let second=now.getSeconds();

hour=(hour*Math.PI/6)+(minute*Math.PI/(6*60));
drawHand(hour,radius*0.5,6,"black");

minute=(minute*Math.PI/30);
drawHand(minute,radius*0.7,4,"blue");

second=(second*Math.PI/30);
drawHand(second,radius*0.9,2,"red");
}

function drawHand(pos,len,width,color){
ctx.beginPath();
ctx.lineWidth=width;
ctx.strokeStyle=color;
ctx.moveTo(0,0);
ctx.rotate(pos);
ctx.lineTo(0,-len);
ctx.stroke();
ctx.rotate(-pos);
}

/* LOAD DATA ON START */
window.onload=function(){
renderWork();
renderUser();
renderAdmin();
};
</script>

</body>
</html>
